name: Daily Repository Update

permissions:
  contents: write

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  update-repo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Git
        run: |
          git config user.name "DevSync Bot"
          git config user.email "23f2001645@ds.study.iitm.ac.in"

      - name: 23f2001645@ds.study.iitm.ac.in - Create daily commit
        run: |
          echo "Updated on $(date)" >> daily-log.txt
          git add daily-log.txt
          git commit -m "Automated daily update - $(date)" || echo "No changes"
          git push
